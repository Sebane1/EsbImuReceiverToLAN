[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=0
    -D CORE_DEBUG_LEVEL=0
    -D CONFIG_ESP32_WIFI_DYNAMIC_TX_BUFFER_NUM=128
    -D CONFIG_ESP32_WIFI_DYNAMIC_RX_BUFFER_NUM=128
    -D CONFIG_ESP32_WIFI_STATIC_RX_BUFFER_NUM=16
    -D CONFIG_LWIP_UDP_RECVMBOX_SIZE=16
    -D CONFIG_LWIP_TCPIP_RECVMBOX_SIZE=16
; We need this for USB Host operation
lib_deps =
    https://github.com/esp32beans/ESP32_USB_Host_HID.git
